<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conectare - Lăbuțe fericite</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body style="background-color: var(--muted); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
    <!-- Cursor Tracker -->
    <div id="cursor-tracker" class="cursor-tracker">
        <div class="cursor-glow"></div>
    </div>

    <div class="login-container" style="width: 100%; max-width: 400px; padding: 2rem; background: white; border-radius: 1.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.1); text-align: center;">
        <a href="index.html" class="logo" style="justify-content: center; margin-bottom: 2rem;">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" style="color: var(--accent);">
                <path d="M12 14c1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3 1.34 3 3 3zm-5-4c1.38 0 2.5-1.12 2.5-2.5S8.38 5 7 5s-2.5 1.12-2.5 2.5S5.62 10 7 10zm10 0c1.38 0 2.5-1.12 2.5-2.5S18.38 5 17 5s-2.5 1.12-2.5 2.5S15.62 10 17 10zm-5-6c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM7.5 15c-1.38-0-2.5 1.12-2.5 2.5s1.12 2.5 2.5 2.5 2.5-1.12 2.5-2.5-1.12-2.5-2.5-2.5zm9 0c-1.38 0-2.5 1.12-2.5 2.5s1.12 2.5 2.5 2.5 2.5-1.12 2.5-2.5-1.12-2.5-2.5-2.5z"/>
            </svg>
            <span style="font-size: 1.5rem;">Lăbuțe fericite</span>
        </a>
        
        <h2 style="margin-bottom: 0.5rem;">Bine ai revenit!</h2>
        <p style="opacity: 0.6; margin-bottom: 2rem;">Conectează-te pentru a-ți vedea animalele favorite.</p>
        
        <form id="login-form">
            <div class="form-group" style="text-align: left;">
                <label class="form-label">Email</label>
                <input type="email" class="form-input" placeholder="email@exemplu.ro" required>
            </div>
            <div class="form-group" style="text-align: left;">
                <label class="form-label">Parolă</label>
                <input type="password" class="form-input" placeholder="••••••••" required>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; font-size: 0.875rem;">
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                    <input type="checkbox"> Ține-mă minte
                </label>
                <a href="#" style="color: var(--accent); font-weight: 600;">Ai uitat parola?</a>
            </div>
            <button type="submit" class="btn-submit" style="padding: 1rem;">Conectare</button>
        </form>
        
        <div style="margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid var(--border); font-size: 0.875rem;">
            <p>Nu ai un cont? <a href="#" style="color: var(--accent); font-weight: 600;">Înregistrează-te</a></p>
        </div>
        
        <div style="margin-top: 1.5rem;">
            <a href="index.html" style="opacity: 0.6; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                Înapoi la site
            </a>
        </div>
    </div>

    <script>
        // Cursor Tracker
        const cursorTracker = document.getElementById('cursor-tracker');
        document.addEventListener('mousemove', (e) => {
            gsap.to(cursorTracker, {
                x: e.clientX - 32,
                y: e.clientY - 32,
                duration: 0.5,
                ease: 'power2.out'
            });
        });

        // Login Submit
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = e.target.querySelector('input[type="email"]').value;
            const name = email.split('@')[0];
            const user = { name: name.charAt(0).toUpperCase() + name.slice(1), email: email };
            localStorage.setItem('currentUser', JSON.stringify(user));
            alert('Conectare reușită! Bine ai venit, ' + user.name + '!');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
